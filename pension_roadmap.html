function ChainRow({ color, icon, title, steps, dim }) {
  return (
    <div style={{ marginBottom: 14, opacity: dim ? 0.15 : 1, transition: "opacity 0.2s" }}>
      <div style={{ fontSize: 11, color, fontWeight: 700, marginBottom: 7 }}>{icon} {title}</div>
      <div style={{ display: "flex", alignItems: "flex-start", flexWrap: "wrap", gap: 0 }}>
        {steps.map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center" }}>
            <div style={{
              background: s.highlight ? `${color}22` : "rgba(255,255,255,0.04)",
              border: `1px solid ${s.highlight ? color + "66" : "#1e3a5f"}`,
              borderRadius: 8, padding: "7px 11px", minWidth: 85, maxWidth: 145,
            }}>
              <div style={{
                fontSize: 11, color: s.highlight ? color : (s.bold ? "#e2e8f0" : "#94a3b8"),
                fontWeight: s.bold ? 700 : 400,
                textAlign: "center", whiteSpace: "pre-line", lineHeight: 1.4,
              }}>{s.text}</div>
              {s.cause && <div style={{ fontSize: 9, color: "#3d4f66", textAlign: "center", marginTop: 3, lineHeight: 1.3 }}>{s.cause}</div>}
            </div>
            {i < steps.length - 1 && (
              <div style={{ padding: "0 3px", color: `${color}66`, fontSize: 14, fontWeight: 700 }}>→</div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

          은퇴 연금 전략 로드맵
          <span style={{ color: "#475569", fontWeight: 400, fontSize: 13, marginLeft: 8 }}>2026 – 2040+</span>
        </h1>
        {/* 체인 필터 */}
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontSize: 10, color: "#475569", marginRight: 2, letterSpacing: 1 }}>체인 필터:</span>
          <button onClick={() => setActiveChain(null)} style={{
            padding: "3px 11px", borderRadius: 20, border: "1px solid",
            borderColor: !activeChain ? "#94a3b8" : "#1e3a5f",
            background: !activeChain ? "rgba(148,163,184,0.15)" : "transparent",
            color: !activeChain ? "#e2e8f0" : "#475569",
            cursor: "pointer", fontSize: 11, fontWeight: 600,
          }}>전체</button>
          {Object.values(CHAINS).map(c => (
            <button key={c.id} onClick={() => setActiveChain(activeChain === c.id ? null : c.id)} style={{
              padding: "3px 11px", borderRadius: 20, border: "1px solid",
              borderColor: activeChain === c.id ? c.color : `${c.color}44`,
              background: activeChain === c.id ? `${c.color}22` : "transparent",
              color: activeChain === c.id ? c.color : `${c.color}88`,
              cursor: "pointer", fontSize: 11, fontWeight: 600,
            }}>{c.icon} {c.label}</button>
          ))}
        </div>
      </div>

      <div style={{ padding: "16px 20px 60px", maxWidth: 860, margin: "0 auto" }}>

        {/* 미결 메모 */}
        <div style={{
          marginBottom: 16, padding: "10px 14px",
          background: "rgba(234,179,8,0.08)",
          border: "1px solid rgba(234,179,8,0.3)",
          borderLeft: "3px solid #eab308",
          borderRadius: "0 10px 10px 0",
        }}>
          <div style={{ fontSize: 10, color: "#eab308", fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>📌 미결 메모</div>
          <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>
            RIA 계좌에 <span style={{ color: "#fde68a", fontWeight: 600 }}>SPY 1주 잔여 보유 중</span> — 처리 방향 미결정
            <span style={{ color: "#475569" }}> (매도 후 ISA 이체 또는 RIA 잔류 중 선택 필요, 금액 약 80~90만원 추정)</span>
          </div>
        </div>

        {/* 인과관계 흐름도 */}
        <div style={{ marginBottom: 16 }}>
          <button onClick={() => setShowFlow(!showFlow)} style={{
            background: "rgba(255,255,255,0.04)", border: "1px solid #1e3a5f",
            color: "#94a3b8", padding: "5px 13px", borderRadius: 8,
            cursor: "pointer", fontSize: 12, marginBottom: 10,
          }}>{showFlow ? "▼" : "▶"} 핵심 인과관계 한눈에 보기</button>

          {showFlow && (
            <div style={{ background: "#0d1b2a", border: "1px solid #1e3a5f", borderRadius: 12, padding: "16px 18px" }}>
              <div style={{ fontSize: 10, color: "#60a5fa", letterSpacing: 2, marginBottom: 14, fontWeight: 700 }}>WHY-BECAUSE 연결 구조</div>
              <ChainRow color={CHAINS.RIA.color} icon={CHAINS.RIA.icon} title="RIA 절세 체인 (2026)"
                dim={activeChain && activeChain !== "RIA"}
                steps={[
                  { text: "SPY 51주 매도\n(RIA계좌)\n실입금 4,952만", bold: true },
                  { text: "VOO 홀딩\n연금저축 매수 중단", cause: "∵ 해외ETF 매수→차감비율↑→RIA공제↓" },
                  { text: "절세\n~250만원", bold: true, highlight: true },
                  { text: "2027년부터\nVOO 매도 가능", cause: "∵ 과세연도 분리" },
                ]}
              />
              <ChainRow color={CHAINS.VOO.color} icon={CHAINS.VOO.icon} title="VOO → 3계좌 자금 체인 (2027~2028.9)"
                dim={activeChain && activeChain !== "VOO"}
                steps={[
                  { text: "VOO 1주/3주\n매도(2027.01~)", bold: true },
                  { text: "연금저축\n+25만→125만/월", cause: "→연 1,500만 한도" },
                  { text: "IRP1\n25만/월", cause: "→세액공제 300만" },
                  { text: "ISA\n~77만/월", cause: "→비과세 연 930만" },
                  { text: "세액공제\n900만 풀 활용", bold: true, highlight: true },
                ]}
              />
              <ChainRow color={CHAINS.ISA.color} icon={CHAINS.ISA.icon} title="RIA→ISA 이체 체인 (2027~2029) — 실제 수치 확정"
                dim={activeChain && activeChain !== "ISA"}
                steps={[
                  { text: "2027\n3,070만", bold: true, cause: "이월2,000+당해2,000-VOO930" },
                  { text: "2028\n1,370만", cause: "한도2,000-VOO630" },
                  { text: "2029\n512만", cause: "RIA잔여 전액" },
                  { text: "합계\n4,952만 ✅", bold: true, highlight: true },
                  { text: "ISA 만기\n2030.03→연금전환", cause: "+세액공제 300만" },
                ]}
              />
              <ChainRow color={CHAINS.HLTH.color} icon={CHAINS.HLTH.icon} title="건보료 피부양자 체인 (2029~2038)"
                dim={activeChain && activeChain !== "HLTH"}
                steps={[
                  { text: "사적연금\n연 1,500만 이내", bold: true },
                  { text: "연소득\n2,000만 미만", cause: "∵ 피부양자 조건" },
                  { text: "건보료 0원\n(8년)", bold: true, highlight: true },
                  { text: "총 절감\n~1,600~2,400만", cause: "≈연 200~300만×8년" },
                ]}
              />
            </div>
          )}
        </div>

        {/* ISA 한도 시뮬레이션 */}
        <div style={{ marginBottom: 16 }}>
          <button onClick={() => setShowISA(!showISA)} style={{
            background: "rgba(255,255,255,0.04)", border: "1px solid #1e3a5f",
            color: "#94a3b8", padding: "5px 13px", borderRadius: 8,
            cursor: "pointer", fontSize: 12, marginBottom: 10,
          }}>{showISA ? "▼" : "▶"} ISA 한도 × RIA 이체 시뮬레이션 (수정 확정판)</button>

          {showISA && (
            <div style={{ background: "#0d1b2a", border: "1px solid #1e3a5f", borderRadius: 12, padding: "16px 18px", overflowX: "auto" }}>
              <div style={{ fontSize: 10, color: "#a855f7", letterSpacing: 2, marginBottom: 12, fontWeight: 700 }}>ISA 연도별 한도 배분 (실제 수치 반영)</div>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead>
                  <tr>
                    {["연도","ISA 가용한도","VOO→ISA","RIA 이체","합계","이월"].map((h,i) => (
                      <th key={i} style={{ padding: "6px 10px", borderBottom: "1px solid #1e3a5f", color: "#64748b", textAlign: "right", fontWeight: 600, whiteSpace: "nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {ISA_TABLE.map((row, i) => (
                    <tr key={i} style={{ borderBottom: "1px solid #0f1929" }}>
                      <td style={{ padding: "8px 10px", color: "#a855f7", fontWeight: 700 }}>{row.year}</td>
                      <td style={{ padding: "8px 10px", textAlign: "right", color: "#e2e8f0" }}>{row.avail}</td>
                      <td style={{ padding: "8px 10px", textAlign: "right", color: "#60a5fa" }}>{row.voo === "0" ? <span style={{color:"#334155"}}>0</span> : row.voo}</td>
                      <td style={{ padding: "8px 10px", textAlign: "right", color: "#c084fc", fontWeight: 600 }}>{row.ria === "0" ? <span style={{color:"#334155"}}>0</span> : row.ria}</td>
                      <td style={{ padding: "8px 10px", textAlign: "right", color: "#e2e8f0" }}>{row.total}</td>
                      <td style={{ padding: "8px 10px", textAlign: "right", color: row.carry.startsWith("+") ? "#86efac" : "#334155" }}>{row.carry}</td>
                    </tr>
                  ))}
                  <tr style={{ borderTop: "2px solid #1e3a5f" }}>
                    <td colSpan={3} style={{ padding: "8px 10px", color: "#64748b", fontSize: 11 }}>RIA 이체 합계</td>
                    <td style={{ padding: "8px 10px", textAlign: "right", color: "#a855f7", fontWeight: 700 }}>4,952만 ✅</td>
                    <td colSpan={2} style={{ padding: "8px 10px", color: "#475569", fontSize: 11 }}>SPY 1주 잔여분 별도 ⚠️</td>
                  </tr>
                </tbody>
              </table>
            </div>
          )}
        </div>

        {/* 타임라인 */}
        {TIMELINE.map((yearData, yi) => {
          const isOpen = openYears[yi] !== false;
          return (
            <div key={yi} style={{ display: "flex", gap: 0, marginBottom: 6 }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 30, flexShrink: 0 }}>
                <div style={{
                  width: 14, height: 14, borderRadius: "50%",
                  background: yearData.phaseColor, boxShadow: `0 0 12px ${yearData.phaseColor}88`,
                  flexShrink: 0, marginTop: 20, zIndex: 2,
                }} />
                {yi < TIMELINE.length - 1 && (
                  <div style={{
                    width: 2, flex: 1, minHeight: 40,
                    background: `linear-gradient(to bottom,${yearData.phaseColor}55,${TIMELINE[yi+1].phaseColor}33)`,
                    marginTop: 4,
                  }} />
                )}
              </div>

              <div style={{
                flex: 1, background: "#0c1524",
                border: `1px solid ${yearData.phaseColor}33`,
                borderLeft: `3px solid ${yearData.phaseColor}`,
                borderRadius: "0 12px 12px 0", overflow: "hidden", marginBottom: 4,
              }}>
                <div onClick={() => toggleYear(yi)} style={{
                  padding: "13px 16px", cursor: "pointer",
                  background: `linear-gradient(90deg,${yearData.phaseColor}18,transparent)`,
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 24, fontWeight: 900, color: yearData.phaseColor, letterSpacing: -1 }}>{yearData.year}</span>
                    <span style={{ fontSize: 13, color: "#cbd5e1", fontWeight: 500 }}>{yearData.phase}</span>
                  </div>
                  <span style={{ color: "#334155", fontSize: 16, transform: isOpen ? "rotate(90deg)" : "none", transition: "0.2s" }}>›</span>
                </div>

                {isOpen && (
                  <div style={{ padding: "4px 14px 14px" }}>
                    {yearData.periods.map((period, pi) => (
                      <div key={pi} style={{ marginTop: 12 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                          <span style={{
                            fontSize: 11, fontWeight: 700,
                            background: period.highlight ? `${yearData.phaseColor}33` : "rgba(255,255,255,0.05)",
                            color: period.highlight ? yearData.phaseColor : "#64748b",
                            border: `1px solid ${period.highlight ? yearData.phaseColor+"55" : "#1e3a5f"}`,
                            padding: "2px 9px", borderRadius: 4,
                          }}>{period.period}</span>
                          <span style={{ fontSize: 12, color: "#475569" }}>{period.label}</span>
                        </div>

                        {period.events.map((ev, ei) => {
                          const chain = CHAINS[ev.chain];
                          const dimmed = activeChain && activeChain !== ev.chain;
                          return (
                            <div key={ei} style={{ marginBottom: 7, opacity: dimmed ? 0.2 : 1, transition: "opacity 0.2s" }}>
                              <div style={{
                                border: `1px solid ${chain.color}33`,
                                borderLeft: `3px solid ${chain.color}`,
                                borderRadius: "0 10px 10px 0", overflow: "hidden",
                              }}>
                                <div style={{ padding: "5px 11px 4px", background: `${chain.color}0e`, display: "flex", alignItems: "center", gap: 5 }}>
                                  <span style={{ fontSize: 11 }}>{chain.icon}</span>
                                  <span style={{ fontSize: 10, color: chain.color, fontWeight: 700 }}>{chain.label}</span>
                                </div>
                                <div style={{ padding: "8px 12px 10px" }}>
                                  <div style={{ fontSize: 13, color: "#e2e8f0", lineHeight: 1.6, whiteSpace: "pre-line", marginBottom: (ev.why||ev.sub) ? 8 : 0 }}>
                                    {ev.what}
                                  </div>
                                  {ev.why && (
                                    <div style={{ padding: "7px 10px", background: "rgba(255,255,255,0.03)", borderRadius: 6, borderLeft: `2px solid ${chain.color}44`, marginBottom: (ev.consequence||ev.sub) ? 7 : 0 }}>
                                      <div style={{ fontSize: 9, color: chain.color, fontWeight: 700, letterSpacing: 1, marginBottom: 3 }}>WHY · 이 시점인 이유</div>
                                      <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.6, whiteSpace: "pre-line" }}>{ev.why}</div>
                                    </div>
                                  )}
                                  {ev.sub && (
                                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: ev.consequence ? 7 : 0 }}>
                                      {ev.sub.map((s, si) => (
                                        <div key={si} style={{ padding: "6px 10px", background: "rgba(59,130,246,0.1)", border: "1px solid rgba(59,130,246,0.2)", borderRadius: 8, flex: 1, minWidth: 110 }}>
                                          <div style={{ fontSize: 12, fontWeight: 700, color: "#60a5fa", marginBottom: 3 }}>{s.acct} · {s.amount}</div>
                                          <div style={{ fontSize: 10, color: "#475569", lineHeight: 1.4, whiteSpace: "pre-line" }}>{s.reason}</div>
                                        </div>
                                      ))}
                                    </div>
                                  )}
                                  {ev.consequence && (
                                    <div style={{ display: "flex", gap: 6, alignItems: "flex-start", padding: "6px 10px", background: `${chain.color}11`, borderRadius: 6 }}>
                                      <span style={{ fontSize: 12, color: chain.color, flexShrink: 0, fontWeight: 700 }}>∴</span>
                                      <div style={{ fontSize: 12, color: "#cbd5e1", lineHeight: 1.5, whiteSpace: "pre-line" }}>{ev.consequence}</div>
                                    </div>
                                  )}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        })}

        {/* 핵심 원칙 */}
        <div style={{ marginTop: 20, padding: "16px 18px", background: "linear-gradient(135deg,#0d1b2a,#1a2744)", border: "1px solid #1e3a5f", borderRadius: 12 }}>
          <div style={{ fontSize: 10, color: "#60a5fa", letterSpacing: 2, marginBottom: 12, fontWeight: 700 }}>절대 잊으면 안 되는 한도·순서</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 8 }}>
            {[
              { icon: "🏦", text: "연금저축 + IRP1 합산 연간 1,800만 한도\n(연금저축 1,500만 + IRP1 300만)" },
              { icon: "💎", text: "세액공제: 연금저축 600만 + IRP1 300만 = 900만\n(납입 한도 1,800만과 별개 개념)" },
              { icon: "🏥", text: "사적연금 연 1,500만 이내 유지\n→ 16.5% 분리과세 + 피부양자 자격 동시 보호" },
              { icon: "🔢", text: "인출 순서: 비과세원금 → 세액공제분/수익\n→ 개인IRP(IRP1) → 퇴직IRP(IRP2)" },
            ].map((item, i) => (
              <div key={i} style={{ display: "flex", gap: 8, padding: "9px 11px", background: "rgba(255,255,255,0.03)", border: "1px solid #1e3a5f", borderRadius: 8 }}>
                <span style={{ fontSize: 14, flexShrink: 0 }}>{item.icon}</span>
                <span style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.5, whiteSpace: "pre-line" }}>{item.text}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
